<header>
  <div class="main">
    <a href="{{ "" | absLangURL }}">{{ .Site.Title }}</a>
  </div>
  <nav aria-label="Main navigation">
    {{ range .Site.Menus.main }}
    <a href="{{ .URL }}">{{ .Name }}</a>
    {{ end }}
    <div class="nav-search" id="nav-search" data-search-index="{{ "search/index.json" | absURL }}">
      <button class="nav-search-toggle" id="nav-search-toggle" aria-label="Search" aria-expanded="false" title="Search">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <div class="nav-search-dropdown" id="nav-search-dropdown" hidden>
        <input type="search" class="nav-search-input" id="nav-search-input" placeholder="Search posts..." autocomplete="off" spellcheck="false">
        <ul class="nav-search-results" id="nav-search-results"></ul>
      </div>
    </div>
    <label class="theme-switch" title="Toggle dark mode">
      <input type="checkbox" id="theme-toggle" aria-label="Toggle dark mode" />
      <span class="slider">
        <span class="icon icon-sun"
          ><svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" /></svg
        ></span>
        <span class="icon icon-moon"
          ><svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" /></svg
        ></span>
      </span>
    </label>
  </nav>
</header>
